<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion Admin</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="theme-dark">
<div class="auth-shell">
    <div class="auth-brand">
        <div class="auth-brand-badge">Administration</div>
        <h1>Connexion administrateur</h1>
        <p class="muted">Gestion des professeurs, matieres et notes.</p>
    </div>
    <div class="card card-narrow">
        <h2>Identifiants</h2>

        <form th:action="@{/login}" method="post">
            <label for="username">Identifiant</label>
            <input id="username" type="text" name="username" placeholder=" " required autocomplete="username">
            <label for="password">Mot de passe</label>
            <input id="password" type="password" name="password" placeholder=" " required autocomplete="current-password">
            <button type="submit">Se connecter</button>
        </form>
        <p th:if="${param.error}" class="error">Identifiants invalides.</p>
        <a class="link-back" th:href="@{/login}">Retour au portail</a>
    </div>
</div>
</body>
</html>
