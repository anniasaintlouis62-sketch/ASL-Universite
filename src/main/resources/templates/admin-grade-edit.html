<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Modifier note</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="theme-dark">
<div class="container">
    <div class="card card-narrow">
        <h2>Modifier la note</h2>
        <form th:action="@{/admin/grades/{id}(id=${grade.id})}" method="post">
            <label for="studentId">Etudiant</label>
            <select id="studentId" name="studentId" required>
                <option th:each="s : ${students}"
                        th:value="${s.id}"
                        th:selected="${s.id == grade.student.id}"
                        th:text="${s.studentId + ' - ' + s.fullName}"></option>
            </select>
            <label for="subjectId">Matiere</label>
            <select id="subjectId" name="subjectId" required>
                <option th:each="m : ${subjects}"
                        th:value="${m.id}"
                        th:selected="${m.id == grade.subject.id}"
                        th:text="${m.name}"></option>
            </select>
            <label for="value">Note</label>
            <input id="value" type="number" name="value" min="0" max="20" step="0.5" th:value="${grade.value}" required>
            <label for="academicYear">Annee academique</label>
            <input id="academicYear" type="text" name="academicYear" th:value="${grade.academicYear}" placeholder="2025-2026" required>
            <button type="submit">Enregistrer</button>
        </form>
        <a class="link-back" th:href="@{/admin/notes}">Retour a la liste</a>
    </div>
</div>
</body>
</html>
