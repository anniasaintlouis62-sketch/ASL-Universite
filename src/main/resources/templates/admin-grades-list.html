<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notes</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="theme-dark">
<div class="container">
    <div class="top-bar">
        <h1>Notes</h1>
        <a class="btn btn-outline btn-sm" th:href="@{/admin/dashboard}">Accueil admin</a>
    </div>

    <div class="card">
        <h2>Ajouter une note</h2>
        <form th:action="@{/admin/grades}" th:object="${newGrade}" method="post">
            <select th:field="*{student}" required>
                <option value="">Choisir etudiant</option>
                <option th:each="s : ${students}" th:value="${s.id}" th:text="${s.studentId + ' - ' + s.fullName}"></option>
            </select>
            <select th:field="*{subject}" required>
                <option value="">Choisir matiere</option>
                <option th:each="m : ${subjects}" th:value="${m.id}" th:text="${m.name}"></option>
            </select>
            <input th:field="*{value}" type="number" min="0" max="20" step="0.5" required>
            <input th:field="*{academicYear}" placeholder="Annee academique (ex: 2025-2026)" required>
            <button type="submit">Ajouter</button>
        </form>
    </div>

    <div class="card card-spaced">
        <h2>Liste des notes</h2>
        <form th:action="@{/admin/notes}" method="get" class="table-actions">
            <select name="subjectId">
                <option value="">Toutes les matieres</option>
                <option th:each="m : ${subjects}"
                        th:value="${m.id}"
                        th:selected="${filterSubjectId != null and filterSubjectId == m.id}"
                        th:text="${m.name}"></option>
            </select>
            <select name="academicYear">
                <option value="">Toutes les annees</option>
                <option th:each="y : ${academicYears}"
                        th:value="${y}"
                        th:selected="${filterAcademicYear == y}"
                        th:text="${y}"></option>
            </select>
            <button type="submit" class="btn btn-sm">Filtrer</button>
            <a th:href="@{/admin/notes}" class="btn btn-sm btn-outline">Reinitialiser</a>
        </form>
        <div class="table-scroll">
            <table>
                <thead>
                <tr>
                    <th>Etudiant</th>
                    <th>Matiere</th>
                    <th>Annee</th>
                    <th>Note</th>
                    <th class="col-actions">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="g : ${grades}">
                    <td th:text="${g.student.studentId + ' - ' + g.student.fullName}"></td>
                    <td th:text="${g.subject.name}"></td>
                    <td th:text="${g.academicYear}"></td>
                    <td th:text="${g.value}"></td>
                    <td class="col-actions">
                        <div class="table-actions">
                            <a class="btn btn-sm" th:href="@{/admin/grades/{id}/edit(id=${g.id})}">Modifier</a>
                            <form th:action="@{/admin/grades/{id}/delete(id=${g.id})}" method="post" class="form-inline">
                                <button type="submit" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Supprimer cette note ?');">Supprimer</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
